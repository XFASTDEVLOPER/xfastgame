<style>

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
border-bottom:2px solid cyan;
}

.logo{

text-decoration:none;

text-shadow:0 0 20px cyan;
}

.games{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:40px;
}

.card{
width:300px;
background:#111;
padding:25px;
border:2px solid cyan;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,255,.3);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 35px cyan;
}

.card h2{
margin-bottom:15px;
}

.card p{
color:#ccc;
margin-bottom:25px;
}

.button{
display:inline-block;
padding:14px 28px;
border:2px solid cyan;
border-radius:30px;
color:white;
text-decoration:none;
transition:.3s;
}

.button:hover{
background:cyan;
color:black;
}

footer{
margin-top:60px;
padding:25px;
text-align:center;
