header{

transition:.3s;
}

box-shadow:0 0 25px cyan;

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;

}

.card{
width:280px;
background:#111;
padding:25px;
border:2px solid cyan;
border-radius:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px cyan;

footer{

padding:30px;
